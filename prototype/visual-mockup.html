<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Typing Fishing — Visual Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Dusk pond palette — locked, everything derives from these */
    --dusk-peach: #f5b78a;
    --ember:      #e8846b;
    --rose-dusk:  #c96a83;
    --plum:       #6b4a72;
    --deep-plum:  #452b52;
    --water-teal: #3f7d8c;
    --water-mid:  #2c5a6e;
    --water-deep: #1c3a4d;
    --abyss:      #122736;
    --foam:       #cfe8dd;
    --gold:       #f0c060;
    --moss:       #8fbf88;
    --ink:        #f2ede3;
    --dim:        #9db4b8;
    --display: "Silkscreen", ui-monospace, monospace;
    --mono: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--mono);
    background: var(--abyss);
    color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 14px;
  }
  h1 { font-family: var(--display); font-size: 13px; letter-spacing: 0.1em; color: var(--dim); }

  /* ============ THE POND ============ */
  #scene {
    position: relative;
    width: min(720px, 100%);
    height: 360px;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  #scene.shake { animation: shake 0.3s; }
  @keyframes shake {
    20% { transform: translate(-5px, 2px); } 40% { transform: translate(4px, -2px); }
    60% { transform: translate(-3px, 1px); } 80% { transform: translate(2px, -1px); }
  }

  #sky {
    position: absolute; inset: 0 0 45% 0;
    background: linear-gradient(180deg, var(--dusk-peach) 0%, var(--ember) 55%, var(--rose-dusk) 100%);
  }
  #sun {
    position: absolute; left: 62%; top: 26%; width: 54px; height: 54px;
    background: var(--gold); border-radius: 50%;
    box-shadow: 0 0 34px 10px rgba(240,192,96,0.55);
  }
  .cloud {
    position: absolute; height: 16px; border-radius: 8px;
    background: rgba(245,183,138,0.55); filter: blur(3px);
    animation: drift linear infinite;
  }
  @keyframes drift { from { transform: translateX(-140px); } to { transform: translateX(760px); } }

  .hills { position: absolute; left: -2%; width: 104%; height: 30%; }
  #hills-far {
    top: 30%; background: var(--plum);
    clip-path: polygon(0 70%, 10% 45%, 22% 62%, 36% 38%, 52% 60%, 66% 42%, 80% 58%, 92% 46%, 100% 60%, 100% 100%, 0 100%);
  }
  #hills-near {
    top: 37%; background: var(--deep-plum);
    clip-path: polygon(0 60%, 14% 78%, 26% 52%, 40% 72%, 55% 50%, 70% 70%, 84% 54%, 100% 72%, 100% 100%, 0 100%);
  }

  #water {
    position: absolute; left: 0; right: 0; top: 52%; bottom: 0;
    background: linear-gradient(180deg, var(--water-teal) 0%, var(--water-mid) 45%, var(--water-deep) 80%, var(--abyss) 100%);
  }
  .wave { position: absolute; left: 0; width: 200%; height: 42px; opacity: 0.5; }
  .wave svg { width: 100%; height: 100%; display: block; }
  #wave1 { top: -6px;  animation: waveSlide 14s linear infinite; }
  #wave2 { top: 26px;  animation: waveSlide 22s linear infinite reverse; opacity: 0.35; }
  #wave3 { top: 64px;  animation: waveSlide 34s linear infinite; opacity: 0.22; }
  @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  #glitter {
    position: absolute; left: 58%; top: 0; width: 90px; height: 60%;
    background: repeating-linear-gradient(180deg,
      rgba(240,192,96,0.35) 0 3px, transparent 3px 11px);
    filter: blur(1px);
    animation: glitterShift 3.5s ease-in-out infinite alternate;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
  }
  @keyframes glitterShift { from { transform: translateX(-6px); opacity: 0.7; } to { transform: translateX(6px); opacity: 1; } }

  .fish-shadow {
    position: absolute; height: 12px; border-radius: 50%;
    background: rgba(10,25,35,0.5); filter: blur(3px);
    animation: shadowDrift linear forwards;
  }
  @keyframes shadowDrift { from { transform: translateX(0); } to { transform: translateX(820px); } }

  /* boat rig bobs as one unit */
  #rig { position: absolute; left: 26px; top: 88px; animation: bob 4.5s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(4px) rotate(0.8deg); } }
  #boat { width: 88px; height: 26px; background: var(--deep-plum); border-radius: 4px 16px 8px 8px; }
  #boat::after { content:""; position:absolute; left:6px; top:20px; width:76px; height:6px; background: rgba(10,25,35,0.4); border-radius: 4px; filter: blur(2px); }
  #kid { position: absolute; left: 18px; top: -22px; width: 16px; height: 24px; background: var(--gold); border-radius: 5px 5px 2px 2px; }
  #rod { position: absolute; left: 32px; top: -30px; width: 40px; height: 3px; background: var(--deep-plum); transform: rotate(-24deg); border-radius: 2px; }
  #line {
    position: absolute; left: 70px; top: -20px; height: 2px; width: 0;
    background: rgba(242,237,227,0.6);
    transform-origin: left center; transform: rotate(24deg);
    transition: width 0.4s ease;
  }

  #fish {
    position: absolute; top: 250px; width: 56px; height: 26px; background: var(--moss);
    border-radius: 12px 4px 4px 12px; opacity: 0;
    transition: left 0.35s ease, opacity 0.3s ease, top 0.35s ease;
  }
  #fish::after { content:""; position:absolute; right:-12px; top:4px; border:9px solid transparent; border-left:14px solid var(--moss); }
  #fish::before { content:""; position:absolute; left:10px; top:8px; width:5px; height:5px; border-radius:50%; background: var(--abyss); }
  #fish.rare { background: var(--gold); box-shadow: 0 0 14px rgba(240,192,96,0.7); }
  #fish.rare::after { border-left-color: var(--gold); }
  #fish.landing { animation: fishArc 0.7s ease forwards; }
  @keyframes fishArc {
    40% { transform: translate(-30px, -90px) rotate(-30deg); }
    100% { transform: translate(-60px, -40px) rotate(-70deg); opacity: 0; }
  }

  /* particles & floaters */
  .p {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    background: var(--foam); pointer-events: none;
    animation: splash 0.65s ease-out forwards;
  }
  @keyframes splash {
    to { transform: translate(var(--dx), var(--dy)) scale(0.1); opacity: 0; }
  }
  .coinfloat {
    position: absolute; font-family: var(--display); font-size: 15px; color: var(--gold);
    text-shadow: 0 2px 6px rgba(0,0,0,0.6); pointer-events: none;
    animation: rise 1.1s ease-out forwards;
  }
  @keyframes rise { to { transform: translateY(-52px); opacity: 0; } }

  /* UI living inside the pond */
  #status {
    position: absolute; top: 12px; left: 0; right: 0; text-align: center;
    font-family: var(--display); font-size: 11px; color: var(--ink);
    text-shadow: 0 2px 8px rgba(20,30,40,0.8); letter-spacing: 0.06em;
  }
  #word {
    position: absolute; left: 50%; bottom: 52px; transform: translateX(-50%);
    font-size: 36px; letter-spacing: 0.14em; min-width: 120px; min-height: 54px;
    padding: 4px 22px; border-radius: 27px; text-align: center;
    background: rgba(12,26,38,0.5);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  #word .done { color: var(--moss); }
  #word .todo { color: var(--ink); }
  #word.shakeword { animation: shakeword 0.16s; }
  @keyframes shakeword { 25% { transform: translateX(calc(-50% - 6px)); } 75% { transform: translateX(calc(-50% + 6px)); } }
  #word:empty { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }

  /* tension = the bottom edge of the pond itself */
  #meter { position: absolute; left: 0; right: 0; bottom: 0; height: 8px; background: rgba(0,0,0,0.4); }
  #meter-fill { height: 100%; width: 0%; background: var(--moss); transition: width 0.15s, background 0.15s; }

  #tint {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, #16213f 0%, #0d1b33 100%);
    mix-blend-mode: multiply; opacity: 0;
    animation: nightcycle 90s ease-in-out infinite;
  }
  @keyframes nightcycle {
    0%, 34% { opacity: 0; } 50%, 72% { opacity: 0.55; } 88%, 100% { opacity: 0; }
  }

  /* ============ BELOW THE POND ============ */
  #hud { display: flex; gap: 12px; margin-top: 14px; }
  .chip {
    font-family: var(--display); font-size: 11px; color: var(--dim);
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 14px; border-radius: 8px;
  }
  .chip b { color: var(--ink); font-size: 14px; }
  .chip.coins b { color: var(--gold); }

  #controls { display: flex; gap: 10px; align-items: center; margin-top: 12px; font-size: 12px; color: var(--dim); }
  .toggle-btn {
    font-family: var(--display); font-size: 10px; color: var(--dim);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
  .toggle-btn.active { color: var(--abyss); background: var(--gold); border-color: var(--gold); }
  .toggle-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  #guide { position: relative; width: 430px; height: 208px; margin-top: 16px; max-width: 100%; }
  .key {
    position: absolute; width: 38px; height: 38px;
    border: 1px solid rgba(157,180,184,0.25); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--dim); background: rgba(18,39,54,0.6);
  }
  .key.ghost-key { opacity: 0.35; }
  .key.target { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(240,192,96,0.45); }
  .finger {
    position: absolute; width: 18px;
    border: 1.5px solid rgba(242,237,227,0.28); background: rgba(242,237,227,0.05);
    border-radius: 9px; pointer-events: none;
    transition: transform 0.18s ease, border-color 0.18s, background 0.18s;
  }
  .finger.active { border-color: var(--gold); background: rgba(240,192,96,0.16); }
  .palm {
    position: absolute; border: 1.5px solid rgba(242,237,227,0.18);
    background: rgba(242,237,227,0.03); border-radius: 50%; pointer-events: none;
  }

  #hint { margin-top: 12px; font-size: 11px; color: var(--dim); opacity: 0.75; text-align: center; max-width: 460px; line-height: 1.6; }

  @media (prefers-reduced-motion: reduce) {
    .wave, #rig, .cloud, #glitter, #tint { animation: none !important; }
    .finger, #line, #fish { transition: none; }
    #scene.shake, #word.shakeword { animation: none; }
  }
</style>
</head>
<body>
  <h1>TYPING FISHING — VISUAL MOCKUP</h1>

  <div id="scene">
    <div id="sky">
      <div id="sun"></div>
      <div class="cloud" style="top:14%; width:90px; animation-duration:70s;"></div>
      <div class="cloud" style="top:26%; width:60px; animation-duration:95s; animation-delay:-40s;"></div>
    </div>
    <div class="hills" id="hills-far"></div>
    <div class="hills" id="hills-near"></div>
    <div id="water">
      <div id="glitter"></div>
      <div class="wave" id="wave1"><svg viewBox="0 0 1440 42" preserveAspectRatio="none"><path d="M0 22 Q 60 8 120 22 T 240 22 T 360 22 T 480 22 T 600 22 T 720 22 T 840 22 T 960 22 T 1080 22 T 1200 22 T 1320 22 T 1440 22 V42 H0 Z" fill="rgba(207,232,221,0.5)"/></svg></div>
      <div class="wave" id="wave2"><svg viewBox="0 0 1440 42" preserveAspectRatio="none"><path d="M0 24 Q 80 10 160 24 T 320 24 T 480 24 T 640 24 T 800 24 T 960 24 T 1120 24 T 1280 24 T 1440 24 V42 H0 Z" fill="rgba(63,125,140,0.9)"/></svg></div>
      <div class="wave" id="wave3"><svg viewBox="0 0 1440 42" preserveAspectRatio="none"><path d="M0 26 Q 110 14 220 26 T 440 26 T 660 26 T 880 26 T 1100 26 T 1320 26 T 1440 26 V42 H0 Z" fill="rgba(28,58,77,0.9)"/></svg></div>
    </div>
    <div id="rig">
      <div id="boat"></div>
      <div id="kid"></div>
      <div id="rod"></div>
      <div id="line"></div>
    </div>
    <div id="fish"></div>
    <div id="status">Type the word to cast</div>
    <div id="word"></div>
    <div id="meter"><div id="meter-fill"></div></div>
    <div id="tint"></div>
  </div>

  <div id="hud">
    <span class="chip">CAUGHT <b id="caught">0</b></span>
    <span class="chip coins">COINS <b id="coins">0</b></span>
    <span class="chip">ESCAPED <b id="escaped">0</b></span>
    <span class="chip">REEL <b id="dist">—</b></span>
  </div>

  <div id="controls">
    <span>Words:</span>
    <button class="toggle-btn active" id="pool-stage1">STAGE 1 (HOME ROW)</button>
    <button class="toggle-btn" id="pool-demo">ALL DEMO WORDS</button>
    <span style="margin-left:14px">Fingers:</span>
    <button class="toggle-btn active" id="guide-toggle">ON</button>
  </div>

  <div id="guide"></div>

  <p id="hint">Word-at-a-time reeling (decided). Errors raise tension; correct letters at any speed lower it. Rare gold fish are worth more coins. The pond drifts toward night and back on its own.</p>

<script>
(() => {
  // ---- Tuning knobs ----
  const CFG = {
    errorTension: 12,
    correctRelief: 3,
    escapeAt: 100,
    wordsToLand: 5,
    biteDelayMs: [1200, 3200],
    wordPauseMs: 450,
    coinsByRarity: { common: 1, rare: 8 },
  };

  // Stage 1 = the actual 37 home-row words from words.json (inlined; file:// can't fetch)
  const WORD_POOLS = {
    stage1: ["all","has","had","add","ask","half","gas","fall","hall","ads","flag","dad",
             "adds","glad","sad","ash","asks","dash","hash","shall","flash","glass","falls",
             "salad","flask","lash","slash","sag","lag","fads","lads","gall","gala","flags",
             "halls","glads","salads"],
    demo:   ["fish","lake","reel","cast","dad","sun","water","boat","calm","line",
             "pond","fin","tail","swim","wave","hook","bait","rod","dock","frog",
             "moss","reed","drift","still","ripple","catch","shore","stone"],
  };
  let WORDS = WORD_POOLS.stage1;

  // Dad joke flavor text — one pool per moment, picked at random
  const PUNS = {
    cast: [
      "Type the word to cast — reel easy does it",
      "Type the word to cast. Let's get kraken",
      "Type the word to cast — any fin is possible",
    ],
    wait: [
      "Something's fishy down there…",
      "Waiting… just for the halibut",
      "Any second now. I'm not squidding",
      "Patience… good things come to those with bait",
    ],
    bite: [
      "Fish on! Holy mackerel!",
      "Oh my cod — reel it in!",
      "A bite! Hook, line, and sinker!",
      "Fish on! Don't trout yourself now",
    ],
    catchCommon: [
      "Caught it! Reel-y nice work",
      "Landed! That was off the scale",
      "Caught — and it wasn't even a fluke",
      "Got it! You're quite the catch-er",
    ],
    catchRare: [
      "✨ RARE! Holy carp! ✨",
      "✨ RARE! You're o-fish-ally amazing ✨",
      "✨ RARE! Simply fin-tastic ✨",
    ],
    escape: [
      "It got away… cod it be worse?",
      "Escaped! A missed oppor-tuna-ty",
      "Gone… but the pond is patient",
      "It slipped away — better luck next tide",
    ],
  };

  let phase = "cast", target = "", typed = 0, tension = 0, wordsLeft = 0;
  let caught = 0, escaped = 0, coins = 0;
  let inputLocked = false;

  const $ = id => document.getElementById(id);
  const el = { scene: $("scene"), word: $("word"), status: $("status"), fill: $("meter-fill"),
               caught: $("caught"), escaped: $("escaped"), coins: $("coins"), dist: $("dist"),
               line: $("line"), fish: $("fish"), water: $("water") };

  const pick = a => a[Math.floor(Math.random() * a.length)];
  const rand = (a, b) => a + Math.random() * (b - a);

  // ---- Juice ----
  function burst(x, y, n) {
    for (let i = 0; i < n; i++) {
      const p = document.createElement("div");
      p.className = "p";
      p.style.left = x + "px"; p.style.top = y + "px";
      p.style.setProperty("--dx", rand(-46, 46) + "px");
      p.style.setProperty("--dy", rand(-70, -14) + "px");
      el.scene.appendChild(p);
      setTimeout(() => p.remove(), 700);
    }
  }
  function coinFloat(x, y, amount) {
    const c = document.createElement("div");
    c.className = "coinfloat";
    c.textContent = "+" + amount;
    c.style.left = x + "px"; c.style.top = y + "px";
    el.scene.appendChild(c);
    setTimeout(() => c.remove(), 1200);
  }
  function shakeScene() {
    el.scene.classList.remove("shake"); void el.scene.offsetWidth; el.scene.classList.add("shake");
  }
  // ambient fish shadows
  setInterval(() => {
    if (document.hidden) return;
    const s = document.createElement("div");
    s.className = "fish-shadow";
    s.style.width = rand(30, 70) + "px";
    s.style.top = rand(60, 150) + "px";
    s.style.left = "-90px";
    s.style.animationDuration = rand(16, 30) + "s";
    el.water.appendChild(s);
    setTimeout(() => s.remove(), 31000);
  }, 6000);

  // ---- Rendering ----
  function renderWord() {
    el.word.innerHTML =
      `<span class="done">${target.slice(0, typed)}</span><span class="todo">${target.slice(typed)}</span>`;
    updateGuide(target[typed]);
  }
  function renderTension() {
    el.fill.style.width = tension + "%";
    el.fill.style.background = tension > 66 ? "var(--ember)" : tension > 33 ? "var(--gold)" : "var(--moss)";
  }
  function fishPosition() {
    const progress = 1 - wordsLeft / CFG.wordsToLand;
    el.fish.style.left = (600 - progress * 460) + "px";
  }
  function setStatus(t) { el.status.textContent = t; }

  // ---- Phases ----
  function startCast() {
    phase = "cast"; inputLocked = false;
    target = pick(WORDS); typed = 0;
    tension = 0; renderTension();
    el.dist.textContent = "—";
    el.line.style.width = "0px";
    el.fish.style.opacity = 0;
    el.fish.classList.remove("rare", "landing");
    el.fish.style.transform = "";
    setStatus(pick(PUNS.cast));
    renderWord();
  }

  function startWait() {
    phase = "wait"; inputLocked = true;
    el.word.textContent = "";
    updateGuide(null);
    el.line.style.width = "330px";
    burst(400, 195, 5);
    setStatus(pick(PUNS.wait));
    setTimeout(bite, rand(...CFG.biteDelayMs));
  }

  function bite() {
    phase = "reel"; inputLocked = false;
    wordsLeft = CFG.wordsToLand;
    if (Math.random() < 0.2) el.fish.classList.add("rare");
    el.fish.style.opacity = 1;
    fishPosition();
    el.dist.textContent = wordsLeft + " words";
    shakeScene();
    burst(410, 200, 10);
    setStatus(pick(PUNS.bite));
    nextReelWord();
  }

  function nextReelWord() { target = pick(WORDS); typed = 0; renderWord(); }

  function wordComplete() {
    wordsLeft--;
    el.dist.textContent = wordsLeft > 0 ? wordsLeft + " words" : "landing…";
    fishPosition();
    burst(parseInt(el.fish.style.left) + 28, 258, 4);
    if (wordsLeft <= 0) return land(true);
    inputLocked = true;
    el.word.innerHTML = `<span class="done">${target}</span>`;
    updateGuide(null);
    setTimeout(() => { inputLocked = false; nextReelWord(); }, CFG.wordPauseMs);
  }

  function land(success) {
    phase = "done"; inputLocked = true;
    el.word.textContent = "";
    updateGuide(null);
    if (success) {
      const rare = el.fish.classList.contains("rare");
      const amount = rare ? CFG.coinsByRarity.rare : CFG.coinsByRarity.common;
      caught++; coins += amount;
      el.caught.textContent = caught; el.coins.textContent = coins;
      el.fish.classList.add("landing");
      burst(150, 240, 14);
      coinFloat(140, 200, amount);
      setStatus(rare ? pick(PUNS.catchRare) : pick(PUNS.catchCommon));
    } else {
      escaped++; el.escaped.textContent = escaped;
      el.fish.style.left = "760px";
      setStatus(pick(PUNS.escape));
    }
    setTimeout(startCast, 1500);
  }

  // ---- Input ----
  document.addEventListener("keydown", (e) => {
    if (inputLocked || e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key.length !== 1) return;
    const key = e.key.toLowerCase();
    if (!/[a-z]/.test(key)) return;

    if (key === target[typed]) {
      typed++;
      if (phase === "reel") { tension = Math.max(0, tension - CFG.correctRelief); renderTension(); }
      renderWord();
      if (typed === target.length) {
        if (phase === "cast") startWait();
        else if (phase === "reel") wordComplete();
      }
    } else {
      el.word.classList.remove("shakeword"); void el.word.offsetWidth; el.word.classList.add("shakeword");
      if (phase === "reel") {
        tension = Math.min(CFG.escapeAt, tension + CFG.errorTension);
        renderTension();
        if (tension >= CFG.escapeAt) land(false);
      }
    }
  });

  // ---- Finger guide (same logic as feel prototype, restyled) ----
  const KB = { pitch: 42, rows: [
    { keys: "qwertyuiop", off: 0 },
    { keys: "asdfghjkl;", off: 12 },
    { keys: "zxcvbnm",    off: 34 },
  ]};
  const FINGER_HOMES = { lp:"a", lr:"s", lm:"d", li:"f", ri:"j", rm:"k", rr:"l", rp:";" };
  const FINGER_LEN   = { lp:50, lr:68, lm:78, li:70, ri:70, rm:78, rr:68, rp:50 };
  const LETTER_FINGER = {};
  [["lp","qaz"],["lr","wsx"],["lm","edc"],["li","rfvtgb"],
   ["ri","yhnujm"],["rm","ik"],["rr","ol"],["rp","p;"]]
    .forEach(([f, ls]) => [...ls].forEach(l => LETTER_FINGER[l] = f));

  const guide = $("guide");
  const keyPos = {}, fingerEls = {};
  let guideOn = true;

  KB.rows.forEach((row, r) => {
    [...row.keys].forEach((ch, i) => {
      const x = row.off + i * KB.pitch, y = r * KB.pitch;
      keyPos[ch] = { x: x + 19, y: y + 19 };
      const k = document.createElement("div");
      k.className = "key" + (ch === ";" ? " ghost-key" : "");
      k.textContent = ch;
      k.style.left = x + "px"; k.style.top = y + "px";
      k.dataset.ch = ch;
      guide.appendChild(k);
    });
  });
  [["s","d"],["k","l"]].forEach(([a, b]) => {
    const cx = (keyPos[a].x + keyPos[b].x) / 2;
    const p = document.createElement("div");
    p.className = "palm";
    p.style.width = "96px"; p.style.height = "64px";
    p.style.left = (cx - 48) + "px"; p.style.top = "138px";
    guide.appendChild(p);
  });
  Object.entries(FINGER_HOMES).forEach(([f, home]) => {
    const fin = document.createElement("div");
    fin.className = "finger";
    fin.style.height = FINGER_LEN[f] + "px";
    fin.style.left = (keyPos[home].x - 9) + "px";
    fin.style.top = (keyPos[home].y - 12) + "px";
    guide.appendChild(fin);
    fingerEls[f] = { el: fin, home };
  });

  function updateGuide(letter) {
    guide.querySelectorAll(".key.target").forEach(k => k.classList.remove("target"));
    Object.values(fingerEls).forEach(({ el }) => { el.style.transform = ""; el.classList.remove("active"); });
    if (!guideOn || !letter || !LETTER_FINGER[letter]) return;
    const keyEl = guide.querySelector(`.key[data-ch="${letter}"]`);
    if (keyEl) keyEl.classList.add("target");
    const { el: fin, home } = fingerEls[LETTER_FINGER[letter]];
    fin.style.transform = `translate(${keyPos[letter].x - keyPos[home].x}px, ${keyPos[letter].y - keyPos[home].y}px)`;
    fin.classList.add("active");
  }

  const guideBtn = $("guide-toggle");
  guideBtn.addEventListener("click", () => {
    guideOn = !guideOn;
    guideBtn.textContent = guideOn ? "ON" : "OFF";
    guideBtn.classList.toggle("active", guideOn);
    guide.style.display = guideOn ? "block" : "none";
    updateGuide(guideOn && !inputLocked ? target[typed] : null);
  });

  // ---- Word pool toggle (stage-1 preview) ----
  const poolBtns = { stage1: $("pool-stage1"), demo: $("pool-demo") };
  function setPool(name) {
    WORDS = WORD_POOLS[name];
    poolBtns.stage1.classList.toggle("active", name === "stage1");
    poolBtns.demo.classList.toggle("active", name === "demo");
    if (phase === "cast") startCast();  // refresh the prompt from the new pool
  }
  poolBtns.stage1.addEventListener("click", () => setPool("stage1"));
  poolBtns.demo.addEventListener("click", () => setPool("demo"));

  startCast();
})();
</script>
</body>
</html>
